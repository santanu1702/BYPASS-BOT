services:
  - type: web
    name: link-bypasser-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: TOKEN
        sync: false
      - key: ID
        sync: false
      - key: HASH
        sync: false
      - key: OWNER_ID
        sync: false
      - key: PORT
        value: "8080"
